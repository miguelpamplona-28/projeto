<title>Portfólio das Turmas</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{background:#f5f5f5; transition: 0.3s;}

/* CONFIGURAÇÃO MODO ESCURO */
body.dark-mode { background: #121212; color: white; }
body.dark-mode .card { background: #1e1e1e; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
body.dark-mode h2 { color: white; }

nav{
    background:#32CD32; /* VERDE LIMÃO */
    padding:15px;
    text-align:center;
}
nav button{
    background:white;
    border:none;
    padding:10px 15px;
    margin:5px;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}
nav button:hover{background:#d5f5e3;}

/* Botão do Modo Escuro */
.btn-dark { background: #333 !important; color: white !important; }

.search-box{
    text-align:center;
    margin:20px;
}
.search-box input{
    padding:10px;
    width:260px;
    border-radius:8px;
    border:1px solid #ccc;
}

.section{display:none;padding:40px;}
.active{display:block;}

h2{text-align:center;margin-bottom:30px;}

.container{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    gap:20px;
}

.card{
    background:white;
    width:200px;
    padding:15px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    transition:0.3s;
}
.card:hover{transform:translateY(-8px);}

.card p{
    font-weight:bold;
    margin-bottom:15px;
}

.card a{
    text-decoration:none;
    background:#2ecc71;
    color:white;
    padding:8px 15px;
    border-radius:6px;
    font-size:12px;
    font-weight: bold;
}
.card a:hover{background:#27ae60;}
</style>

<script>
function showSection(id){
    document.querySelectorAll('.section').forEach(sec=>sec.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function buscarAluno(){
    let input = document.getElementById("search").value.toLowerCase();
    let cards = document.querySelectorAll(".card");

    cards.forEach(card => {
        let nome = card.innerText.toLowerCase();
        card.style.display = nome.includes(input) ? "block" : "none";
    });
}

// Lógica Modo Escuro
function toggleDarkMode() {
    document.body.classList.toggle('dark-mode');
}
</script>

</head>
<body>

<nav>
<button onclick="showSection('1A')">1°A</button>
<button onclick="showSection('1B')">1°B</button>
<button onclick="showSection('2A')">2°A</button>
<button onclick="showSection('3A')">3°A</button>
<button class="btn-dark" onclick="toggleDarkMode()">Modo Escuro 🌙</button>
</nav>

<div class="search-box">
<input type="text" id="search" placeholder="Pesquisar aluno..." onkeyup="buscarAluno()">
</div>

<script>
// Função aluno: Botão agora usa o link vindo do código
function aluno(nome, link){

    <div class="card">

}
